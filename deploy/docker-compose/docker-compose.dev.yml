name: music-search-infra-dev

services:
  postgres:
    image: postgres:15-alpine
    container_name: msp-postgres
    environment:
      POSTGRES_DB: music_search
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d music_search"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: msp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: msp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      mc mb --ignore-existing local/$${S3_BUCKET}/raw/audio &&
      mc mb --ignore-existing local/$${S3_BUCKET}/staging &&
      mc mb --ignore-existing local/$${S3_BUCKET}/embeddings &&
      echo 'MinIO bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-music-search}

  qdrant:
    image: qdrant/qdrant:latest
    container_name: msp-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10

  inference-audio:
    build:
      context: ../..
      dockerfile: services/inference-audio/Dockerfile
    container_name: msp-inference-audio
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://app:${POSTGRES_PASSWORD:-changeme}@postgres:5432/music_search
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-music-search}
      MUSICNN_EMBEDDING_PATH: /models/musicnn/musicnn_embedding.onnx
      MUSICNN_PREDICTION_PATH: /models/musicnn/musicnn_prediction.onnx
    volumes:
      - ../../models:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
